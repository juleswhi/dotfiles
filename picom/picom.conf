inactive-opacity = 1;
active-opacity = 1;

opactity_rule = [
    "50:name = 'alacritty'",
    "50:class_g = 'alacritty'"
]

blur:
{
    method = "dual_kawase";
    strength = 2;
}

fading = false;

backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = true;
glx-no-rebind-pixmap = true;
